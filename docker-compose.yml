services:
  redis:
    image: redis:7-alpine
    container_name: some-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: some-ai-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      # Change this to your Ollama host IP (the machine running Ollama)
      - OLLAMA_URL=http://10.2.228.127:11434
      - PORT=3001
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
    driver: local
